services:
  mongo:
    image: mongo:7
    container_name: calc-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-calc}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-calc-password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-calc}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
